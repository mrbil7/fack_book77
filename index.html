<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الهوية - Maqraa</title>
    <style>
        /* Убираем отступы и фиксируем экран */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Фоновый сайт директора — он на весь экран */
        .background-site {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }

        /* Темный слой поверх сайта для акцента */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6); /* Полупрозрачный черный */
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* То самое белое красивое окно */
        .login-box {
            background: #ffffff;
            padding: 40px;
            border-radius: 8px;
            width: 380px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            direction: rtl;
            z-index: 1000;
        }

        .google-logo { width: 80px; margin-bottom: 15px; }

        h2 {
            font-size: 22px;
            margin-bottom: 10px;
            font-weight: 500;
            color: #202124;
        }

        p {
            color: #5f6368;
            font-size: 15px;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        input {
            width: 100%;
            padding: 13px;
            margin-bottom: 15px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: right; /* Текст пишется справа налево */
        }

        .btn {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 12px 0;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            font-size: 16px;
            width: 100%;
            transition: background 0.2s;
        }

        .btn:hover { background: #1557b0; }

        .footer-text {
            margin-top: 25px;
            font-size: 12px;
            color: #70757a;
        }
    </style>
</head>
<body>

    <!-- Шаг 1: Настоящий сайт на заднем плане -->
    <iframe src="https://maqraa-alhallos.netlify.app/feedback" class="background-site"></iframe>

    <!-- Шаг 2: Слой с окном логина -->
    <div class="overlay" id="prank-layer">
        <div class="login-box">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Google_2015_logo.svg/2560px-Google_2015_logo.svg.png" class="google-logo" alt="Google">

            <h2>تسجيل الدخول</h2>
            <p>لأسباب أمنية، يرجى تأكيد حساب Google الخاص بك للمتابعة إلى استمارة "المقرأة". تم اكتشاف نشاط غير معتاد.</p>

            <input type="email" placeholder="البريد الإلكتروني أو الهاتف" required>
            <input type="password" placeholder="كلمة المرور" required>

            <button class="btn" onclick="showWarning()">متابعة</button>

            <div class="footer-text">نظام حماية الحسابات الموحد © 2026</div>
        </div>
    </div>

    <script>
        function showWarning() {
            // Сообщение после нажатия кнопки
            alert("تحذير أمني من بلال !\n\nهذا مجرد اختبار اختراق (Penetration Test). تمكنت من إنشاء هذه الصفحة لأن موقعك يفتقد حماية X-Frame-Options.\n\nبياناتك لم تسرق، ولكن أي هاكر حقيقي يمكنه فعل ذلك بسهولة!");
            // Убираем окно после нажатия ОК
            document.getElementById('prank-layer').style.display = 'none';
        }
    </script>

</body>
</html>
